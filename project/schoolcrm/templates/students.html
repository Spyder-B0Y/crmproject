<!DOCTYPE html>
<html>

<head>

    <title>Students</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-header bg-primary text-white d-flex justify-content-between">

                <h4>Students</h4>

                <a href="/add-student/" class="btn btn-light btn-sm">Add Student</a>

            </div>

            <div class="card-body">

                <form method="GET" class="mb-3">

                    <div class="input-group">

                        <input type="text" name="q" class="form-control" placeholder="Search student">

                        <button class="btn btn-outline-primary">Search</button>

                    </div>

                </form>

                <table class="table table-striped table-hover">

                    <thead class="table-dark">

                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Class</th>
                            <th>Roll</th>
                            <th>Action</th>
                        </tr>

                    </thead>

                    <tbody>

                        {% for s in students %}

                        <tr>

                            <td>{{s.id}}</td>
                            <td>{{s.name}}</td>
                            <td>{{s.student_class}}</td>
                            <td>{{s.roll}}</td>

                            <td>

                                <a href="/edit-student/{{s.id}}/" class="btn btn-warning btn-sm">Edit</a>

                                <a href="/delete-student/{{s.id}}/" class="btn btn-danger btn-sm">Delete</a>

                            </td>

                        </tr>

                        {% endfor %}

                    </tbody>

                </table>

            </div>

            <div class="card-footer text-end">

                <a href="/dashboard/" class="btn btn-secondary btn-sm">Dashboard</a>

                <a href="/logout/" class="btn btn-danger btn-sm">Logout</a>

            </div>

        </div>

    </div>

</body>

</html>
